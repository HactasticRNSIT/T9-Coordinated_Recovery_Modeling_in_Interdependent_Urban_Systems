version: "3.9"

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: urbansync_postgres
    environment:
      POSTGRES_DB: urbansync
      POSTGRES_USER: urbansync
      POSTGRES_PASSWORD: urbansync_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urbansync"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: urbansync_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: urbansync_backend
    environment:
      DATABASE_URL: postgresql://urbansync:urbansync_dev_password@postgres:5432/urbansync
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      ENVIRONMENT: development
      ML_MODELS_PATH: /app/ml_pipeline/artifacts
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ml_artifacts:/app/ml_pipeline/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: urbansync_celery
    environment:
      DATABASE_URL: postgresql://urbansync:urbansync_dev_password@postgres:5432/urbansync
      REDIS_URL: redis://redis:6379/0
      ML_MODELS_PATH: /app/ml_pipeline/artifacts
    volumes:
      - ./backend:/app
      - ml_artifacts:/app/ml_pipeline/artifacts
    depends_on:
      - redis
      - postgres
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: urbansync_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: urbansync_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@urbansync.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    container_name: urbansync_nginx
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
  ml_artifacts:
